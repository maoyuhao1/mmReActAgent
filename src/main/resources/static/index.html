<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReAct Agent 对话</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hljs-theme">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --bg-body: #f0f2f5;
      --bg-chat: #f8f9fb;
      --bg-chat-header: #1677ff;
      --bg-bubble-user: #1677ff;
      --bg-bubble-ai: #ffffff;
      --bg-input-area: #ffffff;
      --bg-input: #f9fafb;
      --text-primary: #1f2937;
      --text-bubble-user: #ffffff;
      --text-bubble-ai: #1f2937;
      --border-color: #e5e7eb;
      --shadow-color: rgba(0,0,0,0.12);
      --msg-scrollbar: #d1d5db;
      --divider-bg: #f3f4f6;
      --divider-border: #e5e7eb;
      --divider-color: #9ca3af;
      --welcome-color: #9ca3af;
      --msg-label-color: #9ca3af;
      --tool-block-bg: #f8faff;
      --tool-block-border: #bfdbfe;
      --tool-block-header-bg: #eff6ff;
      --tool-block-color: #1e40af;
    }
    [data-theme="dark"] {
      --bg-body: #0f1117;
      --bg-chat: #1a1d27;
      --bg-chat-header: #1e2235;
      --bg-bubble-user: #2563eb;
      --bg-bubble-ai: #252840;
      --bg-input-area: #1a1d27;
      --bg-input: #12141e;
      --text-primary: #e2e8f0;
      --text-bubble-user: #ffffff;
      --text-bubble-ai: #e2e8f0;
      --border-color: #2d3148;
      --shadow-color: rgba(0,0,0,0.3);
      --msg-scrollbar: #3b4260;
      --divider-bg: #1e2235;
      --divider-border: #2d3148;
      --divider-color: #64748b;
      --welcome-color: #64748b;
      --msg-label-color: #64748b;
      --tool-block-bg: #1a2040;
      --tool-block-border: #2d3a6b;
      --tool-block-header-bg: #1e2a4a;
      --tool-block-color: #93c5fd;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-body);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .3s;
    }

    .app {
      width: 100%;
      max-width: 1100px;
      height: 92vh;
      display: flex;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 24px var(--shadow-color);
      position: relative;
    }

    /* 移动端遮罩 */
    #sidebarOverlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 40;
    }

    /* ===== 左侧会话栏 ===== */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #1a1d27;
      display: flex;
      flex-direction: column;
      color: #e2e8f0;
      transition: width .25s, min-width .25s;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      z-index: 50;
    }
    .sidebar.collapsed { width: 0; min-width: 0; }

    .sidebar-header {
      padding: 18px 16px 12px;
      border-bottom: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sidebar-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header h2 { font-size: 15px; font-weight: 600; color: #fff; }

    .btn-collapse-sidebar {
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }
    .btn-collapse-sidebar:hover { color: #fff; background: #2d3148; }

    .btn-new {
      width: 100%;
      padding: 8px 12px;
      background: #3b5bdb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .2s;
    }
    .btn-new:hover { background: #2f4ecf; }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .session-list::-webkit-scrollbar { width: 4px; }
    .session-list::-webkit-scrollbar-thumb { background: #3b4260; border-radius: 2px; }

    .session-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
      margin-bottom: 2px;
      position: relative;
    }
    .session-item:hover { background: #252840; }
    .session-item.active { background: #2d3a6b; }

    .session-item-id {
      font-size: 12px;
      font-family: monospace;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-item.active .session-item-id { color: #93c5fd; }

    .session-item-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }
    .session-item-time { font-size: 11px; color: #64748b; }
    .session-item-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 9999px;
      font-weight: 600;
    }
    .badge-active { background: #0d3320; color: #34d399; border: 1px solid #059669; }
    .badge-closed { background: #1e1e2e; color: #64748b; border: 1px solid #334155; }
    .session-item-count { font-size: 11px; color: #64748b; }

    .session-item-title {
      font-size: 13px;
      color: #e2e8f0;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .session-item.active .session-item-title { color: #fff; }

    /* hover 操作菜单 */
    .session-actions {
      display: none;
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      align-items: center;
      gap: 2px;
      padding-left: 20px;
      background: linear-gradient(to right, transparent, #252840 30%);
    }
    .session-item.active .session-actions {
      background: linear-gradient(to right, transparent, #2d3a6b 30%);
    }
    .session-item:hover .session-actions,
    .session-item.active .session-actions { display: flex; }

    .session-action-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 5px;
      color: #94a3b8;
      font-size: 13px;
      border-radius: 4px;
      transition: color .15s, background .15s;
      line-height: 1;
    }
    .session-action-btn:hover { color: #fff; background: #3b4260; }
    .session-action-btn.fav-on { color: #fbbf24; }
    .session-action-btn.del-btn:hover { color: #ef4444; background: #3b2020; }

    .fav-divider {
      font-size: 10px;
      color: #475569;
      padding: 8px 12px 4px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    /* 标题编辑弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 24px;
      width: 360px;
      color: #e2e8f0;
    }
    .modal h3 { font-size: 15px; margin-bottom: 14px; }
    .modal input {
      width: 100%;
      background: #12141e;
      border: 1px solid #3b4260;
      border-radius: 8px;
      padding: 9px 12px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
    }
    .modal input:focus { border-color: #3b5bdb; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-actions button {
      padding: 7px 18px;
      border-radius: 7px;
      font-size: 13px;
      border: none;
      cursor: pointer;
    }
    .btn-cancel { background: #2d3148; color: #94a3b8; }
    .btn-cancel:hover { background: #363b5a; }
    .btn-confirm { background: #3b5bdb; color: #fff; }
    .btn-confirm:hover { background: #2f4ecf; }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid #2d3148;
      font-size: 11px;
      color: #475569;
      text-align: center;
    }
    .sidebar-footer a { color: #60a5fa; text-decoration: none; }
    .sidebar-footer a:hover { text-decoration: underline; }

    /* ===== 右侧对话区 ===== */
    .chat {
      flex: 1;
      background: var(--bg-chat);
      display: flex;
      flex-direction: column;
      min-width: 0;
      transition: background .3s;
    }

    .chat-header {
      padding: 14px 20px;
      background: var(--bg-chat-header);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      transition: background .3s;
    }
    .chat-header-left { display: flex; align-items: center; gap: 10px; }
    .chat-header-info { display: flex; flex-direction: column; gap: 2px; }
    .chat-header-title { font-size: 16px; font-weight: 600; }
    .chat-header-sub { font-size: 11px; opacity: .75; font-family: monospace; }

    .btn-expand-sidebar {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,.85);
      padding: 4px;
      border-radius: 6px;
      display: none;
      align-items: center;
      transition: color .15s, background .15s;
    }
    .btn-expand-sidebar:hover { color: #fff; background: rgba(255,255,255,.15); }

    .btn-theme {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,.9);
      font-size: 18px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background .15s;
      line-height: 1;
    }
    .btn-theme:hover { background: rgba(255,255,255,.15); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--bg-chat);
      transition: background .3s;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: var(--msg-scrollbar); border-radius: 3px; }

    /* 欢迎页 */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--welcome-color);
      gap: 10px;
    }
    .welcome-title { font-size: 22px; font-weight: 600; color: var(--text-primary); }
    .welcome-sub { font-size: 14px; color: var(--welcome-color); }
    .quick-prompts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
      width: 100%;
      max-width: 480px;
    }
    .qp-btn {
      background: var(--bg-bubble-ai);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      text-align: left;
      transition: border-color .2s, box-shadow .2s;
      line-height: 1.4;
    }
    .qp-btn:hover { border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,.15); }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      position: relative;
    }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 11px;
      color: var(--msg-label-color);
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }
    .bubble.streaming { white-space: pre-wrap; }
    .user .bubble {
      background: var(--bg-bubble-user);
      color: var(--text-bubble-user);
      border-bottom-right-radius: 3px;
      white-space: pre-wrap;
    }
    .assistant .bubble {
      background: var(--bg-bubble-ai);
      color: var(--text-bubble-ai);
      border-bottom-left-radius: 3px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .bubble.history { opacity: .85; }

    /* Markdown 内容样式 */
    .bubble.md-content h1,.bubble.md-content h2,.bubble.md-content h3,.bubble.md-content h4 {
      margin: .8em 0 .4em; line-height: 1.4;
    }
    .bubble.md-content p { margin: .5em 0; }
    .bubble.md-content ul,.bubble.md-content ol { padding-left: 1.4em; margin: .5em 0; }
    .bubble.md-content li { margin: .2em 0; }
    .bubble.md-content code {
      background: rgba(0,0,0,.07);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'Consolas','Monaco',monospace;
      font-size: .9em;
    }
    [data-theme="dark"] .bubble.md-content code { background: rgba(255,255,255,.1); }
    .bubble.md-content pre { margin: .6em 0; border-radius: 8px; overflow-x: auto; }
    .bubble.md-content pre code { background: none; padding: 0; border-radius: 0; }
    .bubble.md-content blockquote {
      border-left: 3px solid #1677ff;
      padding-left: 12px;
      margin: .5em 0;
      opacity: .8;
    }
    .bubble.md-content table {
      border-collapse: collapse;
      width: 100%;
      margin: .6em 0;
      font-size: 13px;
    }
    .bubble.md-content th,.bubble.md-content td {
      border: 1px solid var(--border-color);
      padding: 6px 10px;
      text-align: left;
    }
    .bubble.md-content th { background: rgba(0,0,0,.05); }
    [data-theme="dark"] .bubble.md-content th { background: rgba(255,255,255,.05); }
    .bubble.md-content a { color: #1677ff; text-decoration: none; }
    .bubble.md-content a:hover { text-decoration: underline; }

    /* 代码块复制按钮 */
    .code-block-wrapper { position: relative; }
    .copy-code-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,.15);
      border: none;
      border-radius: 5px;
      color: #e2e8f0;
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
      transition: background .15s;
      z-index: 1;
    }
    .copy-code-btn:hover { background: rgba(255,255,255,.28); }
    .copy-code-btn.copied { background: #16a34a; }

    /* 工具调用折叠块 */
    .tool-block {
      align-self: flex-start;
      border: 1px solid var(--tool-block-border);
      border-radius: 8px;
      font-size: 12px;
      max-width: 78%;
      overflow: hidden;
      background: var(--tool-block-bg);
    }
    .tool-block-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      cursor: pointer;
      background: var(--tool-block-header-bg);
      color: var(--tool-block-color);
      user-select: none;
    }
    .tool-block-header::before {
      content: '▶';
      font-size: 9px;
      transition: transform .2s;
      flex-shrink: 0;
    }
    .tool-block.open .tool-block-header::before { transform: rotate(90deg); }
    .tool-block-body {
      display: none;
      padding: 8px 12px;
      color: var(--tool-block-color);
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
      border-top: 1px solid var(--tool-block-border);
    }
    .tool-block.open .tool-block-body { display: block; }
    .tool-block-result {
      padding: 5px 12px;
      color: var(--tool-block-color);
      opacity: .75;
      font-size: 11px;
      border-top: 1px solid var(--tool-block-border);
    }

    .divider {
      align-self: center;
      font-size: 11px;
      color: var(--divider-color);
      background: var(--divider-bg);
      padding: 3px 12px;
      border-radius: 9999px;
      border: 1px solid var(--divider-border);
    }

    /* 输入区 */
    .input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg-input-area);
      flex-shrink: 0;
      transition: background .3s, border-color .3s;
    }
    textarea {
      flex: 1;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color .2s, background .3s;
      background: var(--bg-input);
      color: var(--text-primary);
    }
    textarea:focus { border-color: #1677ff; }
    textarea:disabled { opacity: .6; cursor: not-allowed; }
    textarea::placeholder { color: var(--msg-label-color); }

    .btn-send {
      padding: 10px 20px;
      background: #1677ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
      height: 44px;
    }
    .btn-send:hover { background: #0958d9; }
    .btn-send:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-send.btn-stop { background: #ef4444; }
    .btn-send.btn-stop:hover { background: #dc2626; }

    /* 消息复制按钮（hover 显示） */
    .msg-actions {
      display: none;
      position: absolute;
      bottom: -26px;
      right: 0;
      gap: 4px;
      z-index: 10;
    }
    .message.assistant:hover .msg-actions { display: flex; }
    /* 扩展 hover 区域，覆盖按钮所在的 -26px 区域，防止鼠标移过去时 hover 丢失 */
    .message.assistant::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: 0;
      right: 0;
      height: 30px;
    }
    .msg-action-btn {
      background: var(--bg-bubble-ai);
      border: 1px solid var(--border-color);
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 11px;
      color: var(--msg-label-color);
      cursor: pointer;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .msg-action-btn:hover { color: var(--text-primary); border-color: #1677ff; }
    .msg-action-btn.copied { color: #16a34a; border-color: #16a34a; }

    .cursor::after { content: "▋"; animation: blink .8s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .loading-dots::after { content: ''; animation: dots 1.2s step-end infinite; }
    @keyframes dots {
      0%  { content: ''; }
      33% { content: '.'; }
      66% { content: '..'; }
      100%{ content: '...'; }
    }

    /* ===== 移动端 ===== */
    @media (max-width: 768px) {
      body { align-items: stretch; }
      .app { max-width: 100%; height: 100vh; border-radius: 0; overflow: visible; }
      .sidebar {
        position: absolute;
        top: 0; left: 0;
        height: 100%;
        transform: translateX(0);
        transition: transform .25s;
      }
      .sidebar.collapsed { width: 260px; min-width: 260px; transform: translateX(-100%); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- 移动端遮罩 -->
  <div id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- 左侧会话栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-top">
        <h2>会话列表</h2>
        <button class="btn-collapse-sidebar" onclick="toggleSidebar()" title="折叠侧栏">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
      </div>
      <button class="btn-new" onclick="createNewSession()">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
        </svg>
        新建会话
      </button>
    </div>
    <div class="session-list" id="sessionList">
      <div style="padding:20px;text-align:center;color:#475569;font-size:12px">加载中…</div>
    </div>
    <div class="sidebar-footer">
      <a href="/admin.html" target="_blank">运维控制台 →</a>
    </div>
  </div>

  <!-- 标题编辑弹窗 -->
  <div class="modal-overlay" id="titleModal">
    <div class="modal">
      <h3>设置会话标题</h3>
      <input type="text" id="titleInput" placeholder="输入标题…" maxlength="40" />
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-confirm" onclick="confirmTitle()">确定</button>
      </div>
    </div>
  </div>

  <!-- 右侧对话区 -->
  <div class="chat">
    <div class="chat-header">
      <div class="chat-header-left">
        <button class="btn-expand-sidebar" id="expandSidebarBtn" onclick="toggleSidebar()" title="展开侧栏">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div class="chat-header-info">
          <span class="chat-header-title" id="chatTitle">ReAct Agent</span>
          <span class="chat-header-sub" id="chatSub">请选择或新建会话</span>
        </div>
      </div>
      <button class="btn-theme" id="themeBtn" onclick="toggleTheme()" title="切换主题">🌙</button>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <p class="welcome-title">ReAct Agent</p>
        <p class="welcome-sub">有什么可以帮到你？</p>
        <div class="quick-prompts">
          <button class="qp-btn" onclick="quickSend(this)">🕐 现在几点了？</button>
          <button class="qp-btn" onclick="quickSend(this)">🔢 计算 123 × 456</button>
          <button class="qp-btn" onclick="quickSend(this)">📚 介绍一下 ReAct 框架</button>
          <button class="qp-btn" onclick="quickSend(this)">💡 你能做什么？</button>
          <button class="qp-btn" onclick="quickSend(this)">🌍 地球到月球的距离是多少</button>
          <button class="qp-btn" onclick="quickSend(this)">⚡ 什么是 AI Agent？</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <textarea id="input" placeholder="输入消息，Enter 发送，Shift+Enter 换行…" rows="1" disabled></textarea>
      <button class="btn-send" id="sendBtn" onclick="handleSendOrStop()" disabled>发送</button>
    </div>
  </div>
</div>

<script>
// marked 配置
marked.use({ breaks: true, headerIds: false, mangle: false });

let currentSessionId = null;
let isSending = false;
let currentReader = null;
let streamStopped = false;
let currentToolBlock = null;
let currentToolResultText = '';

// ===== 主题切换 =====
function toggleTheme() {
  const html = document.documentElement;
  const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  applyTheme(newTheme);
  localStorage.setItem('theme', newTheme);
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
  document.getElementById('hljs-theme').href = theme === 'dark'
    ? 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css'
    : 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css';
}

// ===== 侧栏折叠 =====
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const collapsed = sidebar.classList.toggle('collapsed');
  updateExpandBtn(collapsed);
  if (window.innerWidth <= 768) {
    overlay.style.display = collapsed ? 'none' : 'block';
  }
  localStorage.setItem('sidebarCollapsed', collapsed ? '1' : '0');
}

function updateExpandBtn(collapsed) {
  document.getElementById('expandSidebarBtn').style.display = collapsed ? 'flex' : 'none';
}

// ===== Markdown 渲染 =====
function renderMarkdown(text) {
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = marked.parse(text);
  tempDiv.querySelectorAll('pre').forEach(pre => {
    const wrapper = document.createElement('div');
    wrapper.className = 'code-block-wrapper';
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(pre);
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-code-btn';
    copyBtn.textContent = '复制';
    copyBtn.onclick = function() {
      const codeEl = pre.querySelector('code');
      navigator.clipboard.writeText(codeEl ? codeEl.innerText : pre.innerText).then(() => {
        copyBtn.textContent = '已复制';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = '复制'; copyBtn.classList.remove('copied'); }, 2000);
      });
    };
    wrapper.insertBefore(copyBtn, pre);
  });
  tempDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
  return tempDiv.innerHTML;
}

// ===== 初始化 =====
async function init() {
  const savedTheme = localStorage.getItem('theme') || 'light';
  applyTheme(savedTheme);

  const isMobile = window.innerWidth <= 768;
  const savedCollapsed = localStorage.getItem('sidebarCollapsed');
  const startCollapsed = isMobile || savedCollapsed === '1';
  if (startCollapsed) {
    document.getElementById('sidebar').classList.add('collapsed');
  }
  updateExpandBtn(startCollapsed);

  await loadSessionList();
  createNewSession();
}

// ===== 加载会话列表 =====
async function loadSessionList() {
  try {
    const r = await fetch('/api/sessions');
    const sessions = await r.json();
    renderSessionList(sessions);
  } catch (e) {
    document.getElementById('sessionList').innerHTML =
      '<div style="padding:16px;text-align:center;color:#ef4444;font-size:12px">加载失败</div>';
  }
}

function renderSessionList(sessions) {
  const el = document.getElementById('sessionList');
  sessions = sessions.filter(s => s.status !== 'closed');
  if (!sessions.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:#475569;font-size:12px">暂无会话，点击新建</div>';
    return;
  }
  sessions.sort((a, b) => new Date(b.lastActiveAt) - new Date(a.lastActiveAt));
  const favs    = sessions.filter(s => s.favorite);
  const nonFavs = sessions.filter(s => !s.favorite);
  let html = '';
  if (favs.length) {
    html += '<div class="fav-divider">⭐ 收藏</div>';
    html += favs.map(s => sessionItemHtml(s)).join('');
    if (nonFavs.length) html += '<div class="fav-divider">全部</div>';
  }
  html += nonFavs.map(s => sessionItemHtml(s)).join('');
  el.innerHTML = html;
}

function sessionItemHtml(s) {
  const title = s.title ? esc(s.title) : '';
  const shortId = s.id.substring(0, 16) + '…';
  return `
    <div class="session-item ${s.id === currentSessionId ? 'active' : ''}"
         onclick="selectSession('${s.id}')">
      <div style="min-width:0;padding-right:72px">
        ${title ? `<div class="session-item-title">${title}</div>` : ''}
        <div class="session-item-id">${shortId}</div>
        <div class="session-item-meta">
          <span class="session-item-time">${fmtTime(s.lastActiveAt)}</span>
          <span class="session-item-badge badge-${s.status}">${s.status}</span>
        </div>
        <span class="session-item-count">${s.messageCount} 轮对话</span>
      </div>
      <div class="session-actions">
        <button class="session-action-btn ${s.favorite ? 'fav-on' : ''}"
                data-action="fav" data-id="${s.id}"
                title="${s.favorite ? '取消收藏' : '收藏'}">★</button>
        <button class="session-action-btn"
                data-action="rename" data-id="${s.id}" data-title="${title}"
                title="重命名">✏️</button>
        <button class="session-action-btn del-btn"
                data-action="delete" data-id="${s.id}"
                title="删除">🗑</button>
      </div>
    </div>`;
}

// 事件委托处理会话操作按钮
document.getElementById('sessionList').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  e.stopPropagation();
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  if (action === 'fav') toggleFav(id);
  else if (action === 'rename') openTitleModal(id, btn.dataset.title || '');
  else if (action === 'delete') deleteSession(id);
});

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== 删除会话 =====
async function deleteSession(sessionId) {
  if (!confirm('确定要删除该会话吗？此操作不可恢复。')) return;
  try {
    await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
    if (sessionId === currentSessionId) createNewSession();
    loadSessionList();
  } catch (e) {
    alert('删除失败：' + e.message);
  }
}

// ===== 新建会话 =====
function createNewSession() {
  currentSessionId = null;
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  document.getElementById('chatTitle').textContent = 'ReAct Agent';
  document.getElementById('chatSub').textContent = '新对话';
  clearMessages();
  document.getElementById('input').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('input').focus();
}

// ===== 切换会话 =====
async function selectSession(sessionId) {
  currentSessionId = sessionId;
  document.querySelectorAll('.session-item').forEach(el => {
    const idEl = el.querySelector('.session-item-id');
    el.classList.toggle('active', idEl && idEl.textContent.startsWith(sessionId.substring(0, 16)));
  });
  const titleEl = document.querySelector('.session-item.active .session-item-title');
  document.getElementById('chatTitle').textContent = titleEl ? titleEl.textContent : 'ReAct Agent';
  document.getElementById('chatSub').textContent = sessionId;
  document.getElementById('input').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('input').focus();
  clearMessages();
  await loadHistory(sessionId);
}

// ===== 加载历史对话 =====
async function loadHistory(sessionId) {
  try {
    const r = await fetch(`/api/sessions/${sessionId}/conversations`);
    const convs = await r.json();
    if (!convs.length) return;
    addDivider(`历史对话（${convs.length} 轮）`);
    convs.forEach(c => {
      addBubble('user', c.userMessage, true);
      // 渲染工具调用记录
      if (c.toolCalls && c.toolCalls.length > 0) {
        c.toolCalls.forEach(t => {
          const block = addToolBlock(`调用工具：${t.toolName}，参数：${t.inputArgs || '{}'}`);
          if (t.result) updateToolBlock(block, `工具结果：${t.result}`);
        });
      }
      if (c.aiReply) {
        const bubble = addBubble('assistant', '', true);
        bubble.classList.add('md-content');
        bubble.innerHTML = renderMarkdown(c.aiReply);
      }
      if (c.status === 'error' && c.errorMsg) {
        addBubble('assistant', '⚠️ ' + c.errorMsg, true);
      }
    });
    addDivider('以下为新对话');
    scrollToBottom();
  } catch (e) {
    console.error('加载历史失败', e);
  }
}

// ===== 停止生成 =====
function stopGeneration() {
  streamStopped = true;
  if (currentReader) {
    currentReader.cancel();
    currentReader = null;
  }
}

function handleSendOrStop() {
  if (isSending) stopGeneration();
  else sendMessage();
}

// ===== 工具调用块 =====
function addToolBlock(callText) {
  const c = document.getElementById('messages');
  const block = document.createElement('div');
  block.className = 'tool-block open';
  const header = document.createElement('div');
  header.className = 'tool-block-header';
  header.textContent = '🔧 ' + callText;
  header.onclick = () => block.classList.toggle('open');
  const body = document.createElement('div');
  body.className = 'tool-block-body';
  block.appendChild(header);
  block.appendChild(body);
  c.appendChild(block);
  return block;
}

// 更新工具结果（支持多次调用，in-place 更新）
function updateToolBlock(block, resultText) {
  if (!block) return;
  block.querySelector('.tool-block-body').textContent = resultText;
  let summary = block.querySelector('.tool-block-result');
  if (!summary) {
    summary = document.createElement('div');
    summary.className = 'tool-block-result';
    block.appendChild(summary);
  }
  summary.textContent = '✅ ' + (resultText.length > 80 ? resultText.substring(0, 80) + '…' : resultText);
}

// ===== 发送消息 =====
async function sendMessage() {
  if (isSending) return;
  const input = document.getElementById('input');
  const message = input.value.trim();
  if (!message) return;

  const isNewSession = !currentSessionId;
  isSending = true;
  streamStopped = false;
  input.value = '';
  input.style.height = '';

  const btn = document.getElementById('sendBtn');
  btn.textContent = '停止';
  btn.classList.add('btn-stop');
  btn.disabled = false;
  input.disabled = true;

  addBubble('user', message);
  const bubble = addStreamBubble();
  let assistantText = '';
  let resolvedSessionId = currentSessionId;

  try {
    const resp = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, sessionId: currentSessionId || undefined })
    });

    currentReader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await currentReader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const jsonStr = line.slice(5).trim();
        if (!jsonStr) continue;
        try {
          const event = JSON.parse(jsonStr);
          if (event.sessionId && !resolvedSessionId) {
            resolvedSessionId = event.sessionId;
            currentSessionId = resolvedSessionId;
            document.getElementById('chatSub').textContent = resolvedSessionId;
          }
          if (event.type === 'chunk') {
            assistantText += event.content;
            bubble.textContent = assistantText;
          } else if (event.type === 'tool_call') {
            // 新工具调用：保留上一个工具块，开新的
            currentToolBlock = addToolBlock(event.content);
            currentToolResultText = '';
          } else if (event.type === 'tool_result') {
            // 持续更新结果（可能有多次 tool_result 事件：ActingChunk + PostActing）
            currentToolResultText = event.content;
            updateToolBlock(currentToolBlock, currentToolResultText);
          } else if (event.type === 'error') {
            bubble.textContent = '⚠️ ' + event.content;
          }
          scrollToBottom();
        } catch (_) {}
      }
    }
  } catch (e) {
    if (!streamStopped) {
      bubble.textContent = '⚠️ 请求失败：' + e.message;
    }
  } finally {
    currentReader = null;
    currentToolBlock = null;
    currentToolResultText = '';
    bubble.classList.remove('cursor', 'loading-dots', 'streaming');

    if (streamStopped && assistantText) {
      assistantText += ' [已停止]';
      bubble.textContent = assistantText;
    } else if (assistantText && !streamStopped) {
      bubble.classList.add('md-content');
      bubble.innerHTML = renderMarkdown(assistantText);
    }

    streamStopped = false;
    isSending = false;
    btn.textContent = '发送';
    btn.classList.remove('btn-stop');
    btn.disabled = false;
    input.disabled = false;
    input.focus();

    await loadSessionList();
    if (isNewSession && resolvedSessionId) {
      highlightSession(resolvedSessionId);
      setTimeout(async () => {
        await loadSessionList();
        highlightSession(resolvedSessionId);
        const titleEl = document.querySelector('.session-item.active .session-item-title');
        if (titleEl) document.getElementById('chatTitle').textContent = titleEl.textContent;
      }, 2000);
    }
  }
}

function highlightSession(sessionId) {
  document.querySelectorAll('.session-item').forEach(el => {
    const idEl = el.querySelector('.session-item-id');
    el.classList.toggle('active', idEl && idEl.textContent.startsWith(sessionId.substring(0, 16)));
  });
}

// ===== 快捷提示词 =====
function quickSend(btn) {
  const text = btn.innerText.replace(/^\S+\s+/, '').trim();
  const input = document.getElementById('input');
  input.value = text;
  input.dispatchEvent(new Event('input'));
  sendMessage();
}

// ===== DOM 工具函数 =====
function clearMessages() {
  document.getElementById('messages').innerHTML = '';
}

function addBubble(role, text, isHistory = false) {
  const c = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isHistory ? ' history' : '');
  if (role === 'assistant' && !isHistory) bubble.classList.add('streaming');
  bubble.textContent = text;
  div.appendChild(bubble);

  if (role === 'assistant') {
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    const copyBtn = document.createElement('button');
    copyBtn.className = 'msg-action-btn';
    copyBtn.textContent = '复制';
    copyBtn.onclick = () => {
      const content = bubble.innerText || bubble.textContent;
      navigator.clipboard.writeText(content).then(() => {
        copyBtn.textContent = '已复制';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = '复制'; copyBtn.classList.remove('copied'); }, 2000);
      });
    };
    actions.appendChild(copyBtn);
    div.appendChild(actions);
  }

  c.appendChild(div);
  return bubble;
}

function addStreamBubble() {
  const bubble = addBubble('assistant', '');
  bubble.classList.add('cursor', 'loading-dots');
  return bubble;
}

function addDivider(text) {
  const c = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'divider';
  div.textContent = text;
  c.appendChild(div);
}

function scrollToBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays === 0) return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  if (diffDays === 1) return '昨天';
  if (diffDays < 7) return diffDays + '天前';
  return d.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
}

// Enter 发送
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendOrStop(); }
});

// ===== 收藏 =====
async function toggleFav(sessionId) {
  await fetch(`/api/sessions/${sessionId}/favorite`, { method: 'PATCH' });
  loadSessionList();
}

// ===== 标题编辑 =====
let _titleSessionId = null;
function openTitleModal(sessionId, currentTitle) {
  _titleSessionId = sessionId;
  const input = document.getElementById('titleInput');
  input.value = currentTitle || '';
  document.getElementById('titleModal').classList.add('open');
  setTimeout(() => input.focus(), 50);
}
function closeModal() {
  document.getElementById('titleModal').classList.remove('open');
  _titleSessionId = null;
}
async function confirmTitle() {
  const title = document.getElementById('titleInput').value.trim();
  if (!_titleSessionId) return;
  await fetch(`/api/sessions/${_titleSessionId}/title`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title })
  });
  if (_titleSessionId === currentSessionId) {
    document.getElementById('chatTitle').textContent = title || 'ReAct Agent';
  }
  closeModal();
  loadSessionList();
}
document.getElementById('titleInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmTitle();
  if (e.key === 'Escape') closeModal();
});
document.getElementById('titleModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// 自动高度
document.getElementById('input').addEventListener('input', function() {
  this.style.height = '';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

init();
</script>
</body>
</html>
