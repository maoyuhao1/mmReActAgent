<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReAct Agent 对话</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部栏 */
        .header {
            padding: 16px 20px;
            background: #1677ff;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .session-info { font-size: 12px; opacity: 0.8; }

        /* 消息区 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.assistant { align-self: flex-start; align-items: flex-start; }

        .bubble {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .user .bubble { background: #1677ff; color: #fff; border-bottom-right-radius: 4px; }
        .assistant .bubble { background: #f0f0f0; color: #333; border-bottom-left-radius: 4px; }

        /* 工具调用提示 */
        .tool-event {
            align-self: flex-start;
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            color: #874d00;
            max-width: 80%;
        }

        /* 输入区 */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        textarea {
            flex: 1;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: inherit;
            height: 44px;
            line-height: 24px;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: #1677ff; }

        button {
            padding: 0 20px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        button:hover { background: #0958d9; }
        button:disabled { background: #aaa; cursor: not-allowed; }

        /* 光标闪烁动画 */
        .cursor::after {
            content: "▋";
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>ReAct Agent 对话</h1>
        <span class="session-info" id="sessionInfo">会话未创建</span>
    </div>

    <div class="messages" id="messages">
        <!-- 消息动态插入 -->
    </div>

    <div class="input-area">
        <textarea id="input" placeholder="输入消息，按 Enter 发送，Shift+Enter 换行..." rows="1"></textarea>
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
</div>

<script>
    let sessionId = null;

    // 初始化：创建会话
    async function initSession() {
        const resp = await fetch('/api/chat/session', { method: 'POST' });
        const data = await resp.json();
        sessionId = data.sessionId;
        document.getElementById('sessionInfo').textContent = `会话：${sessionId}`;
    }

    // 添加消息气泡，返回 bubble 元素（流式追加用）
    function addMessage(role) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        div.appendChild(bubble);
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return bubble;
    }

    // 添加工具事件提示
    function addToolEvent(text) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'tool-event';
        div.textContent = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('input');
        const message = input.value.trim();
        if (!message) return;

        // 确保会话已创建
        if (!sessionId) await initSession();

        input.value = '';
        input.style.height = '44px';

        // 显示用户消息
        addMessage('user').textContent = message;

        // 禁用发送按钮
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;

        // 创建 assistant 气泡，流式写入
        const bubble = addMessage('assistant');
        bubble.classList.add('cursor');
        let assistantText = '';

        try {
            const resp = await fetch('/api/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, sessionId })
            });

            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // 保留未完整的行

                for (const line of lines) {
                    if (!line.startsWith('data:')) continue;
                    const jsonStr = line.slice(5).trim();
                    if (!jsonStr) continue;

                    try {
                        const event = JSON.parse(jsonStr);
                        if (event.type === 'chunk') {
                            assistantText += event.content;
                            bubble.textContent = assistantText;
                        } else if (event.type === 'tool_call') {
                            addToolEvent('🔧 ' + event.content);
                        } else if (event.type === 'tool_result') {
                            addToolEvent('✅ ' + event.content);
                        } else if (event.type === 'done') {
                            // 完成
                        } else if (event.type === 'error') {
                            bubble.textContent = '⚠️ ' + event.content;
                        }
                        document.getElementById('messages').scrollTop = 999999;
                    } catch (e) {
                        // 跳过非 JSON 行
                    }
                }
            }
        } catch (e) {
            bubble.textContent = '⚠️ 请求失败：' + e.message;
        } finally {
            bubble.classList.remove('cursor');
            btn.disabled = false;
            input.focus();
        }
    }

    // Enter 发送，Shift+Enter 换行
    document.getElementById('input').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // 自动初始化会话
    initSession();
</script>
</body>
</html>
