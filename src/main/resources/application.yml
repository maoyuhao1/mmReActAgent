server:
  port: 8080

spring:
  data:
    mongodb:
      host: localhost
      port: 27017
      database: mmagent_db
      username: mmagent
      password: mmagent123
      authentication-database: mmagent_db
    redis:
      host: localhost
      port: 6379
      password: admin123
      timeout: 2000ms

resilience4j:
  circuitbreaker:
    instances:
      dashscope-agent:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 30s
        slow-call-rate-threshold: 80

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    circuitbreakers:
      enabled: true

search:
  bocha:
    api-key: ${BOCHA_API_KEY:}
    max-results: 5

agent:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
    model-name: qwen-max
  react:
    max-iters: 10
    sys-prompt: >
      你是一个智能助手，可以使用以下工具解决问题：
      - get_current_time：查询指定时区的当前时间
      - calculate：计算数学表达式
      - web_search：在互联网上搜索最新信息（实时数据、新闻、不确定的事实）
      - fetch_url：读取某个网页的详细内容（在 web_search 摘要不足时使用）

      工具调用原则：
      1. 涉及实时信息、最近发生的事件、你不确定的内容，优先调用 web_search
      2. 搜索结果摘要不够详细时，用 fetch_url 精读具体页面
      3. 回答时注明信息来源（URL）
      4. 对话结束后给出清晰、准确的完整回答
  memory:
    msg-threshold: 60        # 消息数超过此值触发压缩
    max-token: 28000         # qwen-max 可用上下文上限
    token-ratio: 0.75        # token 使用率超 75% 触发压缩
    last-keep: 20            # 最近 N 条消息不参与压缩